<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40" role="img" aria-label="divider">
  <!-- Thin lo-fi divider: a whisper of a line + three floating dust motes. -->
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#432874" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#432874" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e8d5b7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8d5b7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="40" fill="#0a0612"/>
  <rect width="1200" height="40" fill="url(#shimmer)" pointer-events="none">
    <animate attributeName="x" values="-1200;1200" dur="4s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <line x1="0" y1="20" x2="1200" y2="20" stroke="url(#line)" stroke-width="1"/>
  <circle cx="480" cy="20" r="3.5" fill="url(#dot)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="20" r="2"   fill="#a78bfa" opacity="0.9"/>
  <circle cx="720" cy="20" r="3.5" fill="url(#dot)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
