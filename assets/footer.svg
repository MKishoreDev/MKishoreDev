<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" role="img" aria-label="footer — the desk goes dark">
  <!--
    footer.svg · closing scene.
    The lamp fades. The cat is asleep. Only the moon stays up.
  -->
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0c0717"/>
      <stop offset="100%" stop-color="#050308"/>
    </linearGradient>
    <linearGradient id="fLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#432874" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#432874" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="fMoon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5e6d3" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0c0717" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="120" fill="url(#fbg)"/>
  <rect width="1200" height="120" fill="url(#shimmer)" pointer-events="none">
    <animate attributeName="x" values="-1200;1200" dur="4s" repeatCount="indefinite" begin="1.5s"/>
  </rect>
  <line x1="0" y1="1" x2="1200" y2="1" stroke="url(#fLine)" stroke-width="1"/>

  <!-- distant moon -->
  <g transform="translate(1050 55)">
    <circle r="34" fill="url(#fMoon)"/>
    <circle r="10" fill="#f5e6d3" opacity="0.85"/>
  </g>

  <!-- small twinkling stars -->
  <g fill="#e8d5b7">
    <circle cx="120" cy="40" r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="30" r="0.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="50" r="0.8"><animate attributeName="opacity" values="0.1;.9;.1" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="35" r="0.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- centered closing line -->
  <text x="600" y="66" text-anchor="middle"
        font-family="'Lora','Georgia',serif" font-style="italic"
        font-size="15" fill="#c9b8d9" opacity="0.9">
    “quietly building things that just work.”
  </text>
  <text x="600" y="88" text-anchor="middle"
        font-family="ui-monospace,'SF Mono',Menlo,monospace"
        font-size="10" fill="#6d5da8" letter-spacing="4">
    ── MKISHOREDEV · MMXXVI ──
  </text>
</svg>
