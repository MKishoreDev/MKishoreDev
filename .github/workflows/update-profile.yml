name: Update Profile README

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:     # Allows manual triggers
  push:
    paths:
      - .github/scripts/update-quote.py
      - .github/scripts/update-commits.py
      - .github/scripts/update-blogs.py
      - .github/scripts/update-banner.py
      - .github/workflows/update-profile.yml

permissions:
  contents: write        # Crucial: grants the action write access to your repo

concurrency:
  group: refresh-profile
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      # 1. Bring the repository files into the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Run automation scripts
      - name: Generate Dynamic Content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/update-commits.py
          git add -A
          COMMITS_CHANGED=false
          if ! git diff --cached --quiet; then
            COMMITS_CHANGED=true
          fi
          git reset HEAD

          python .github/scripts/update-blogs.py

          if [ "$COMMITS_CHANGED" = "true" ]; then
            for i in 1 2 3 4 5; do
              python .github/scripts/update-quote.py
              if git diff --quiet; then
                echo "Quote unchanged, retrying ($i/5)..."
                continue
              fi
              echo "Quote updated"
              break
            done
            python .github/scripts/update-banner.py
          else
            echo "No new commits, skipping quote and banner updates"
          fi

      # 4. Cleanup pycache and commit changes (only if something actually changed)
      - name: Commit and Push Changes
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit"
          else
            find . -type d -name __pycache__ -exec rm -rf {} +
            git add -A
            git commit -m "chore: automated profile update [skip ci]"
            git push
          fi
